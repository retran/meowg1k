name: Dependency Review

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Review
        uses: actions/dependency-review-action@774d14bf50b7a2e2460f9f49e25c52503ecab125
        with:
          fail-on-severity: moderate
