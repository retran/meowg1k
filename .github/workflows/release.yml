name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version: "1.25.2"

      - name: Install cosign (for keyless signing)
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: 'v2.5.3'

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.20.8

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6.4.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.GORELEASER_TAP_TOKEN }}
          COSIGN_EXPERIMENTAL: "true"
