name: CI

on:
  push:
    branches: [dev]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".vscode/**"
  pull_request:
    branches: [dev]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".vscode/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  COVERAGE_THRESHOLD: "70.0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Gosec
        uses: securego/gosec@master
        with:
          args: ./...

  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Ensure modules are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "::error::Run 'go mod tidy' locally and commit changes"; exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Enforce coverage threshold
        id: coverage
        shell: bash
        run: |
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')"
          echo "COVERAGE_PERCENT=$total" >> "$GITHUB_ENV"
          awk -v total="$total" -v th="${COVERAGE_THRESHOLD}" 'BEGIN{ if (total+0 < th+0) { exit 1 } }' \
          || (echo "::error::Coverage ${total}% is below threshold ${COVERAGE_THRESHOLD}%"; exit 1)
          echo "Coverage ${total}% >= ${COVERAGE_THRESHOLD}%"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: coverage.out
          retention-days: 7

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const pct = process.env.COVERAGE_PERCENT ?? 'n/a';
            const threshold = process.env.COVERAGE_THRESHOLD ?? '70.0';
            const ok = !Number.isNaN(parseFloat(pct)) && (parseFloat(pct) >= parseFloat(threshold));
            const marker = '<!-- coverage-comment -->';
            const lines = [
              marker,
              '## Test Coverage',
              `Coverage: ${pct}% ${ok ? '(meets threshold)' : '(below threshold)'}`,
              `Threshold: ${threshold}%`
            ];
            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const prev = comments.find(c => typeof c.body === 'string' && c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false
