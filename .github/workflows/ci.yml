name: CI

on:
  push:
    branches: [dev]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".vscode/**"
  pull_request:
    branches: [dev]
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".vscode/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  COVERAGE_THRESHOLD: "75.0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --version
          skip-cache: false

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run lint
        run: task lint

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run security checks
        run: task security

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mandoc
        run: sudo apt-get update && sudo apt-get install -y mandoc

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate man pages
        run: task man:check

  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bc (required for coverage threshold check)
        run: sudo apt-get update && sudo apt-get install -y bc

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure modules are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "::error::Run 'go mod tidy' locally and commit changes"; exit 1)

      - name: Vet
        run: task vet

      - name: Test
        run: task test

      - name: Get coverage percentage
        id: coverage
        shell: bash
        run: |
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')"
          echo "COVERAGE_PERCENT=$total" >> "$GITHUB_ENV"
          echo "Coverage: ${total}%"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: coverage.out
          retention-days: 7

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const pct = process.env.COVERAGE_PERCENT ?? 'n/a';
            const threshold = process.env.COVERAGE_THRESHOLD ?? '75.0';
            const ok = !Number.isNaN(parseFloat(pct)) && (parseFloat(pct) >= parseFloat(threshold));
            const marker = '<!-- coverage-comment -->';
            const lines = [
              marker,
              '## Test Coverage',
              `Coverage: ${pct}% ${ok ? '✅ (meets threshold)' : '❌ (below threshold)'}`,
              `Threshold: ${threshold}%`,
              '',
              '_Note: testutil packages are excluded from coverage calculation_'
            ];
            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const prev = comments.find(c => typeof c.body === 'string' && c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prev.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false
