profiles:
  fast:
    provider: "nebius"

  smart:
    provider: "nebius"
    model: "Qwen3-30B-A3B-Instruct-2507"
    timeout: "10m"

  gemini:
    provider: "gemini"
    model: "gemini-2.5-pro"
    timeout: "10m"

generate:
  default:
    profile: "fast"
    systemPrompt: >-
      You are a helpful senior Go software developer and reviewer.
      Prefer clear, concise, and actionable feedback.
      When suggesting code, write clean, idiomatic, production-ready Go 1.24+.

  tasks:
    review:
      profile: "smart"
      userPrompt: >-
        Perform a thorough code review of the following Go code.

        Focus areas:
          - Correctness (nil/zero handling, error wrapping, context usage, concurrency, race conditions)
          - API design (naming, visibility, package layout), maintainability, readability
          - Performance (allocations, copies, sync primitives, I/O), hot paths
          - Testing gaps (missing cases, edge/error paths)

        Output format:
          1) Summary — 2–4 bullets.
          2) Findings — numbered list with short, actionable suggestions. Reference lines/functions when possible.
          3) Quick wins — checklist of small fixes.
          4) Optional patch — minimal unified diff for one or two key fixes.

        If the code is fine, state so concisely and suggest minor polish only.

    commit:
      profile: "gemini"
      userPrompt: >-
        Generate a Conventional Commit message for the provided changes.

        Rules:
          - Use one of: feat, fix, refactor, perf, docs, test, chore, build, ci.
          - Subject: imperative, ≤72 chars, no trailing period; include scope if inferable (e.g., core, http, cli).
          - Body: wrap at ~72 cols; explain motivation and user impact.
          - Footer: add "BREAKING CHANGE:" only if truly breaking.

        Output:
          - Single-line header
          - Optional body
          - Optional footers

    doc:
      profile: "smart"
      userPrompt: >-
        Write a complete GoDoc comment for the following exported function or type.
        Requirements:
          - Start with the identifier's name.
          - Be concise, precise, and helpful for IDE hovers.
          - Mention side effects, error cases, and concurrency expectations if relevant.
          - Do NOT include code; only the comment block.

    test:
      profile: "smart"
      userPrompt: >-
        Write comprehensive table-driven unit tests using the standard "testing" package (no third-party deps).
        Requirements:
          - Use subtests with t.Run.
          - Cover happy path, edge cases, and error scenarios.
          - If I/O or time is involved, show how to inject fakes; avoid global state.
          - Ensure tests are deterministic and parallelizable where safe (t.Parallel()).
          - Include minimal example-based test if useful (ExampleXxx).

        Return only compilable *_test.go code.

    refactor:
      profile: "smart"
      userPrompt: >-
        Refactor the following Go code to improve readability, maintainability, and performance,
        while preserving behavior and public API.

        Output:
          1) A single code block with the refactored code.
          2) A short bullet list explaining key changes (naming, structure, error handling, allocations, etc).

        Prefer idiomatic patterns (early returns, clear error wrapping, minimal allocations, small helpers).

    pr:
      profile: "gemini"
      userPrompt: >-
        Create a clear and actionable Pull Request description from the provided diff.

        Produce Markdown in this structure:
          # Title
          - Good PR title describing intention of changes

          ## Summary
          - 1–3 bullets describing the problem and outcome.

          ## Motivation
          - What was wrong or missing before? Why now?

          ## Changes
          - Concise list of key changes (group related items).

          ## Technical Notes
          - Important implementation details, trade-offs, risks.

          ## Backward Compatibility
          - State if breaking changes exist (and migration if needed).

filter:
  ignore:
    - "**/*.lock"
    - "go.sum"
    - "dist/**"
    - "bin/**"
    - ".git/**"

summarize:
  default:
    profile: "fast"
    strategy:
      type: "plaintext"
      sendFullFile: false
    systemPrompt: "Briefly describe the main change in the following input."
  rules:
    - match: "*.go"
      profile: "smart"
      strategy:
        type: "plaintext"
        sendFullFile: true
      systemPrompt: "Describe the changes in the following Go code."
    - match: "LICENSE"
      skip: true
    - match: "*.md"
      profile: "fast"
      strategy:
        type: "plaintext"
        sendFullFile: false
      systemPrompt: "Summarize the documentation changes."

commit:
  profile: "smart"
  systemPrompt: |
    You are an expert software engineer.
    Write a commit message in the Conventional Commits format based on the user's input.

pr:
  profile: "smart"
  systemPrompt: |
    You are an AI assistant writing a Pull Request description.
    Based on the user's input, write a clear and detailed PR description.
