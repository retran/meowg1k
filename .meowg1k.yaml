models:
  qwen-flash:
    provider: "openrouter"
    model: "qwen/qwen3-coder-flash"
    rateLimit:
      requestsPerMinute: 60
      tokensPerMinute: 1000000
      requestsPerDay: 10000

  qwen-plus:
    provider: "openrouter"
    model: "qwen/qwen3-coder-plus"
    rateLimit:
      requestsPerMinute: 60
      tokensPerMinute: 1000000
      requestsPerDay: 10000

  gemini-embeddings:
    provider: "gemini"
    model: "gemini-embedding-001"
    rateLimit:
      requestsPerMinute: 300
      tokensPerMinute: 500000
      requestsPerDay: 100000

  jina:
    provider: "llama"
    model: "jina-embeddings-v4-text-retrieval-F16"
    baseURL: "http://localhost:8080"
    rateLimit:
      requestsPerMinute: 300
      tokensPerMinute: 5000000
      requestsPerDay: 1000000

profiles:
  fast:
    model: "qwen-flash"
    temperature: 0.3
    cache:
      enabled: true
      ttl: "24h"

  smart:
    model: "qwen-plus"
    timeout: "10m"
    temperature: 0.2
    topP: 0.95
    cache:
      enabled: true
      ttl: "72h"

  gemini-embeddings:
    model: "gemini-embeddings"
    timeout: "10m"
    cache:
      enabled: true
      ttl: "72h"

  jina:
    model: "jina"
    timeout: "10m"
    cache:
      enabled: true
      ttl: "1h"

cache:
  enabled: true
  ttl: "24h"

generate:
  default:
    profile: "fast"
    systemPrompt: >-
      You are a helpful senior Go software developer and reviewer.
      Prefer clear, concise, and actionable feedback.
      When suggesting code, write clean, idiomatic, production-ready Go 1.25.1+.

  tasks:
    review:
      profile: "smart"
      userPrompt: >-
        Perform a thorough code review of the following Go code.

        Focus areas:
          - Correctness (nil/zero handling, error wrapping, context usage, concurrency, race conditions)
          - API design (naming, visibility, package layout), maintainability, readability
          - Performance (allocations, copies, sync primitives, I/O), hot paths
          - Testing gaps (missing cases, edge/error paths)

        Output format:
          1) Summary — 2–4 bullets.
          2) Findings — numbered list with short, actionable suggestions. Reference lines/functions when possible.
          3) Quick wins — checklist of small fixes.
          4) Optional patch — minimal unified diff for one or two key fixes.

        If the code is fine, state so concisely and suggest minor polish only.

    doc:
      profile: "smart"
      userPrompt: >-
        Write a complete GoDoc comment for the following exported function or type.
        Requirements:
          - Start with the identifier's name.
          - Be concise, precise, and helpful for IDE hovers.
          - Mention side effects, error cases, and concurrency expectations if relevant.
          - Do NOT include code; only the comment block.

    test:
      profile: "smart"
      userPrompt: >-
        Write comprehensive table-driven unit tests using the standard "testing" package (no third-party deps).
        Requirements:
          - Use subtests with t.Run.
          - Cover happy path, edge cases, and error scenarios.
          - If I/O or time is involved, show how to inject fakes; avoid global state.
          - Ensure tests are deterministic and parallelizable where safe (t.Parallel()).
          - Include minimal example-based test if useful (ExampleXxx).

        Return only compilable *_test.go code.

    refactor:
      profile: "smart"
      userPrompt: >-
        Refactor the following Go code to improve readability, maintainability, and performance,
        while preserving behavior and public API.

        Output:
          1) A single code block with the refactored code.
          2) A short bullet list explaining key changes (naming, structure, error handling, allocations, etc).

        Prefer idiomatic patterns (early returns, clear error wrapping, minimal allocations, small helpers).

filter:
  ignore:
    - "**/*.lock"
    - "go.sum"
    - "dist/**"
    - "bin/**"
    - ".git/**"
    - ".meowg1k/**"
    - "assets/**"
    - ".idea/**"

index:
  profile: "gemini-embeddings"
  chunker:
    maxRunes: 1024
    overlapRunes: 128
  batchSize: 64

ask:
  profile: "smart"
  topK: 20
  minScore: 0.4
  systemPrompt: >-
    You are a Staff Software Engineer acting as an expert peer reviewer. Your task is to help developers understand their codebase.

    Your analysis must be based **strictly and exclusively** on the provided code context. Do not infer functionality or assume the existence of external modules, files, or APIs not present in the context.

    Structure your response as follows:
    1.  **Direct Answer**: Begin with a concise, one-sentence summary that directly answers the user's question.
    2.  **Detailed Explanation**: Elaborate on the answer, referencing specific functions, types, and variables using `monospace font`. If file paths are available in the context, mention them.
    3.  **Code References**: Include short, relevant code snippets from the context to support your explanation.

    If the provided context is insufficient to answer the question, state that clearly and specify what information is missing.

summarize:
  default:
    profile: "fast"
    strategy:
      type: "plain"
      includeOriginalFile: false
      includeChangedFile: false
    systemPrompt: |
      Analyze the file changes and provide a concise summary in 1-2 sentences.
      Focus on the functional impact: what was changed, added, or removed.
      Be specific about the type of change (feature, fix, refactor, etc.).
  rules:
    - match: "**/*.go"
      systemPrompt: |
        Analyze the Go code changes and summarize in 2-3 sentences.
        Focus on:
        - What functionality was added, modified, or removed
        - Key structural changes (new types, methods, interfaces)
        - Important logic or behavior changes
        - Error handling or performance improvements
        Be technical but concise. Mention function/type names when relevant.
    - match: "**/*_test.go"
      systemPrompt: |
        Summarize the test changes in 1-2 sentences.
        Focus on what functionality is being tested, new test cases added, or test improvements made.
    - match: "**/*.yaml"
      systemPrompt: |
        Summarize the configuration changes in 1-2 sentences.
        Focus on what settings were added, modified, or removed and their purpose.
    - match: "**/*.yml"
      systemPrompt: |
        Summarize the configuration changes in 1-2 sentences.
        Focus on what settings were added, modified, or removed and their purpose.
    - match: "**/*.json"
      systemPrompt: |
        Summarize the JSON changes in 1-2 sentences.
        Focus on what data structure or configuration was modified.
    - match: "**/Dockerfile*"
      systemPrompt: |
        Summarize the Docker configuration changes in 1-2 sentences.
        Focus on what build steps, dependencies, or runtime configuration was modified.
    - match: "**/go.mod"
      systemPrompt: |
        Summarize the Go module changes in 1-2 sentences.
        Focus on what dependencies were added, updated, or removed.
    - match: "**/*.sh"
      systemPrompt: |
        Summarize the script changes in 1-2 sentences.
        Focus on what automation or build process was modified.
    - match: "**/Taskfile.yml"
      systemPrompt: |
        Summarize the Task runner changes in 1-2 sentences.
        Focus on what tasks or build processes were modified.
    - match: "**/LICENSE*"
      skip: true
    - match: "**/NOTICE*"
      skip: true
    - match: "**/COPYRIGHT*"
      skip: true
    - match: "**/*.md"
      profile: "fast"
      systemPrompt: |
        Summarize the documentation changes in 1-2 sentences.
        Focus on what content was added, updated, or restructured.
        Mention if it's new documentation, fixes, or improvements to existing content.

commit:
  profile: "smart"
  systemPrompt: |
    You are an expert software engineer writing a commit message in Conventional Commits format.

    Based on the file change summaries provided, create a clear and informative commit message.

    If "Developer Intent" is provided, use it to understand the purpose and context:
    - Extract GitHub issue references (like #123, #456) for footer as "Refs: #123, #456"
    - Look for breaking change indicators to add BREAKING CHANGE footer
    - Use intent to guide commit type, scope, and description
    - Do not include the raw intent text unless it's specifically about references or breaking changes

    Format:
    <type>[optional scope]: <description>

    [optional body]

    [optional footer(s)]

    Guidelines:
    - Use appropriate type: feat, fix, refactor, perf, docs, test, chore, build, ci, style
    - Keep description under 72 characters, imperative mood, no period
    - Add scope in parentheses if changes are focused on specific area (e.g., api, cli, core)
    - Include body if changes need explanation (motivation, context, impact)
    - Add "Refs: #issue" footer if GitHub issues mentioned in intent
    - Add "BREAKING CHANGE:" footer only for actual breaking changes

    Examples:
    - feat(api): add user authentication endpoint
    - fix: resolve memory leak in file processor

      Resolves issue with excessive memory consumption during
      large file processing operations.

      Refs: #123
    - refactor(core): extract shared validation logic

      BREAKING CHANGE: ValidationError interface changed

    Generate only the commit message, nothing else.

pullRequest:
  profile: "smart"
  systemPrompt: |
    You are an expert software engineer creating a Pull Request description for a Go project.

    Based on the file change summaries provided, create a comprehensive and actionable PR description.

    If "Developer Intent" is provided, use it to understand the purpose and context:
    - Extract the main goal and motivation
    - Identify related issues or feature requests
    - Understand the scope and impact of changes
    - Note any breaking changes or migration needs
    - Do not include raw intent text verbatim

    Structure (use Markdown):

    # <Concise PR Title>
    - A short, clear title summarizing the PR's purpose

    ## Summary
    2-4 sentences explaining what this PR does and why. Be clear and specific.
    Start with "This pull request..." or similar action statement.

    ## Motivation
    Explain the problem or need that drove these changes:
    - What was wrong, missing, or could be improved?
    - Why is this change needed now?
    - What's the user or developer impact?

    ## Changes
    Organized list of key changes grouped by category:
    - **Core Changes**: Main functional changes
    - **API Changes**: Public interface modifications (if any)
    - **Internal Refactoring**: Implementation improvements (if any)
    - **Testing**: New or updated tests (if any)
    - **Documentation**: Docs and comments (if any)
    - **Configuration**: Config or build changes (if any)

    Keep items concise but specific. Reference file names or component names when helpful.

    ## Technical Details
    Important implementation notes:
    - Key architectural decisions and trade-offs
    - Performance considerations or improvements
    - Security considerations (if relevant)
    - Dependencies added or updated (if any)
    - Potential risks or areas needing extra review

    ## Breaking Changes
    If applicable, clearly state:
    - What breaks and why
    - Migration path or upgrade steps
    - Version impact

    If no breaking changes: "None"

    ## Testing
    Briefly describe:
    - What testing was done (unit tests, integration tests, manual testing)
    - Key test scenarios covered
    - Any testing gaps or follow-up needed

    Footer:
    If GitHub issues mentioned in developer intent or evident from changes, add as footer:

    Refs: #456, #789

    If none: Omit this footer.

    Guidelines:
    - Be clear, concise, and actionable
    - Use bullet points for readability
    - Avoid redundant phrases like "This PR also..." repeatedly
    - Focus on "what" and "why", not verbose "how"
    - Use technical language appropriate for developers familiar with the codebase
    - Highlight anything reviewers should pay special attention to

    Generate only the PR description in Markdown format, nothing else.
