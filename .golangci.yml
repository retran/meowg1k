run:
  timeout: 5m
  modules-download-mode: readonly
  go: "1.23"

output:
  formats:
    - format: colored-line-number
      path: stdout
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true

linters-settings:
  gofmt:
    simplify: true
    rewrite-rules:
      - pattern: 'interface{}'
        replacement: 'any'
  goimports:
    local-prefixes: github.com/retran/meowg1k
  govet:
    check-shadowing: true
    enable-all: true
    disable:
      - fieldalignment
  misspell:
    locale: US
    ignore-words:
      - meow
      - meowg1k
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc
      - importShadow
  funlen:
    lines: 100
    statements: 50
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100
  goconst:
    min-len: 2
    min-occurrences: 3
  depguard:
    rules:
      prevent_unmaintained_packages:
        list-mode: lax
        files:
          - "!**/*_test.go"
        allow:
          - $gostd
          - github.com/retran/meowg1k
        deny:
          - pkg: "github.com/pkg/errors"
            desc: "use standard library errors package"
  errcheck:
    check-type-assertions: true
    check-blank: true
  exhaustive:
    check-generated: false
    default-signifies-exhaustive: false
  forbidigo:
    forbid:
      - p: ^print.*$
        msg: Do not commit print statements.
  godox:
    keywords:
      - NOTE
      - OPTIMIZE
      - HACK
  gosec:
    includes:
      - G401
      - G501
      - G502
    excludes:
      - G104
      - G204
  lll:
    line-length: 120
  nakedret:
    max-func-lines: 30
  nolintlint:
    allow-leading-space: true
    allow-unused: false
    require-explanation: false
    require-specific: false
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"
  staticcheck:
    checks: ["all"]
  stylecheck:
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
  unused:
    check-exported: false
  whitespace:
    multi-if: false
    multi-func: false

linters:
  disable-all: true
  enable:
    # Error detection
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - exhaustive
    - exhaustruct
    
    # Code quality
    - gocyclo
    - gofmt
    - goimports
    - revive
    - stylecheck
    - unconvert
    - unparam
    - misspell
    - nakedret
    - prealloc
    - predeclared
    - nolintlint
    
    # Performance
    - gocritic
    - maligned
    
    # Security
    - gosec
    
    # Style
    - whitespace
    - wsl
    - nlreturn
    - lll
    - funlen
    - nestif
    - cyclop
    
    # Bugs
    - asciicheck
    - bidichk
    - durationcheck
    - exportloopref
    - makezero
    - nilerr
    - nilnil
    - noctx
    - tenv
    
    # Complexity
    - dupl
    - goconst
    - godox
    - gomnd
    - gomoddirectives
    - gomodguard
    - grouper
    
    # Import organization
    - depguard
    - importas
    
    # Test quality
    - testpackage
    - tparallel
    - testifylint
    
    # Documentation
    - godot
    - containedctx
    - contextcheck
    - decorder
    - errname
    - errorlint
    - forbidigo
    - forcetypeassert
    - gci
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - goconst
    - goerr113
    - gofumpt
    - goheader
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosimple
    - gosmopolitan
    - grouper
    - importas
    - interfacebloat
    - ireturn
    - loggercheck
    - maintidx
    - mirror
    - musttag
    - nonamedreturns
    - paralleltest
    - protogetter
    - reassign
    - tagalign
    - tagliatelle
    - usestdlibvars
    - varnamelen
    - wastedassign
    - zerologlint

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  new: false
  fix: false
  exclude-use-default: true
  exclude-rules:
    # Exclude some linters from running on tests files.
    - path: _test\.go
      linters:
        - gomnd
        - funlen
        - gocyclo
        - dupl
        - lll
        - goconst
        - gocritic
        - errcheck
        - goerr113
        - varnamelen
        - maintidx
        - cyclop
        - nestif
        - exhaustruct
        - paralleltest
        - testpackage
        - wsl
        - nlreturn
        - gochecknoglobals
        - gochecknoinits
        - forbidigo
        - godox
        - exhaustive
        
    # Exclude cmd package from magic number checks
    - path: cmd/
      linters:
        - gomnd
        - goconst
        - gochecknoinits
        - forbidigo
        
    # Exclude main functions from some checks
    - path: main\.go
      linters:
        - gochecknoinits
        - forbidigo
        
    # Exclude generated files
    - path: ".*\\.pb\\.go"
      linters:
        - all
        
    # Allow weak crypto in tests (for mocking)
    - text: "weak cryptographic primitive"
      linters:
        - gosec
        
    # Allow package comments to be missing for internal packages
    - text: "should have a package comment"
      linters:
        - revive
      path: internal/
      
    # Allow magic numbers in configuration
    - text: "Magic number"
      linters:
        - gomnd
      path: "config|version"
      
    # Allow long lines in generated files
    - text: "line is \\d+ characters"
      linters:
        - lll
      path: ".*\\.pb\\.go"

severity:
  default-severity: warning
  case-sensitive: false
  rules:
    - linters:
        - dupl
      severity: info
    - linters:
        - gocritic
      severity: info