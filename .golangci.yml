version: "2"

run:
  go: "1.25.1"
  timeout: 3m
  issues-exit-code: 1

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - misspell
  disable:
    - errcheck

formatters:
  enable:
    - gofumpt
    - gci

  settings:
    gofumpt:
      extra-rules: true

    gci:
      sections:
        - standard
        - default
        - prefix(github.com/retran/meowg1k)
      custom-order: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
