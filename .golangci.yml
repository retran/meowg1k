run:
  timeout: 5m
  modules-download-mode: readonly
  go: "1.25"

output:
  formats:
    - format: colored-line-number
      path: stdout
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters-settings:
  gofumpt:
    local-prefixes: github.com/retran/meowg1k
  govet:
    enable-all: true
    disable:
      - fieldalignment
  misspell:
    locale: US
    ignore-words:
      - meow
      - meowg1k
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc
      - importShadow
  funlen:
    lines: 100
    statements: 50
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 100
  goconst:
    min-len: 2
    min-occurrences: 3
  depguard:
    rules:
      prevent_unmaintained_packages:
        list-mode: lax
        files:
          - "!**/*_test.go"
        allow:
          - $gostd
          - github.com/retran/meowg1k
        deny:
          - pkg: "github.com/pkg/errors"
            desc: "use standard library errors package"
  errcheck:
    check-type-assertions: true
    check-blank: true
  forbidigo:
    forbid:
      - p: ^print.*$
        msg: Do not commit print statements.
  godox:
    keywords:
      - NOTE
      - OPTIMIZE
      - HACK
  gosec:
    includes:
      - G401
      - G501
      - G502
    excludes:
      - G104
      - G204
  lll:
    line-length: 120
  nakedret:
    max-func-lines: 30
  nolintlint:
    allow-leading-space: true
    allow-unused: false
    require-explanation: false
    require-specific: false
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"
  staticcheck:
    checks: ["all"]
  stylecheck:
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
  unused:
    check-exported: false
  whitespace:
    multi-if: false
    multi-func: false

linters:
  disable-all: true
  enable:
    # --- Core & Correctness ---
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - typecheck
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - nilerr

    # --- Style & Formatting ---
    - gofumpt
    - revive
    - stylecheck
    - lll
    - whitespace
    - wsl
    - misspell

    # --- Complexity & Maintainability ---
    - gocyclo
    - funlen
    - dupl
    - goconst
    - godox
    - forbidigo
    - nestif
    - depguard

    # --- Performance ---
    - gocritic
    - prealloc
    - unconvert

    # --- Modern Go & Best Practices ---
    - copyloopvar
    - errorlint
    - err113
    - containedctx
    - noctx
    - unparam

    # --- Testing ---
    - testifylint

    # --- Security ---
    - gosec

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  new: false
  fix: false
  uniq-by-line: true
  exclude-use-default: true
  exclude-rules:
    - path: _test\.go
      linters:
        - gomnd
        - funlen
        - gocyclo
        - dupl
        - lll
        - goconst
        - gocritic
        - errcheck
        - goerr113
        - varnamelen
        - maintidx
        - cyclop
        - nestif
        - exhaustruct
        - paralleltest
        - testpackage
        - wsl
        - nlreturn
        - gochecknoglobals
        - gochecknoinits
        - forbidigo
        - godox
        - exhaustive

    - path: cmd/
      linters:
        - gomnd
        - goconst
        - gochecknoinits
        - forbidigo

    - path: main\.go
      linters:
        - gochecknoinits
        - forbidigo

    - path: ".*\\.pb\\.go"
      linters:
        - all

    - text: "weak cryptographic primitive"
      linters:
        - gosec

    - text: "should have a package comment"
      linters:
        - revive
      path: internal/

    - text: "Magic number"
      linters:
        - gomnd
      path: "config|version"

    - text: "line is \\d+ characters"
      linters:
        - lll
      path: ".*\\.pb\\.go"

severity:
  default-severity: warning
  case-sensitive: false
  rules:
    - linters:
        - dupl
      severity: info
    - linters:
        - gocritic
      severity: info