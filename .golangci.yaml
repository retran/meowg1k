version: "2"

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly
  go: "1.25.8"

linters:
  enable:
    # ============================================================
    # Error Checking & Security
    # ============================================================
    - errcheck          # Check for unchecked errors
    - gosec             # Security issues
    - nilerr            # Check nil error returns
    - errorlint         # Error wrapping and comparisons
    - wrapcheck         # Check error wrapping

    # ============================================================
    # Code Quality & Maintainability
    # ============================================================
    - govet             # Go vet checks
    - staticcheck       # Static analysis
    - unused            # Detect unused code
    - ineffassign       # Detect ineffectual assignments
    - gocyclo           # Cyclomatic complexity
    - gocognit          # Cognitive complexity
    - funlen            # Function length
    - nestif            # Nesting depth
    - dupl              # Duplicate code detection
    - maintidx          # Maintainability index

    # ============================================================
    # Best Practices
    # ============================================================
    - gocritic          # Go best practices
    - revive            # Drop-in replacement for golint
    - goconst           # Repeated strings
    - unconvert         # Unnecessary type conversions
    - predeclared       # Detect usage of predeclared identifiers
    - nolintlint        # Linter directive best practices
    - thelper           # Test helper detection
    - unparam           # Unused function parameters

    # ============================================================
    # Performance
    # ============================================================
    - prealloc          # Slice preallocation
    - bodyclose         # HTTP response body close
    - noctx             # HTTP requests without context
    - rowserrcheck      # SQL row errors
    - sqlclosecheck     # SQL resource close

    # ============================================================
    # Style & Formatting
    # ============================================================
    - whitespace        # Whitespace issues
    - godot             # Comment punctuation
    - misspell          # Spelling errors

    # ============================================================
    # Loop & Copy Safety
    # ============================================================
    - copyloopvar       # Loop variable capture (Go 1.22+)
    - exhaustive        # Exhaustiveness of enum switch

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      disable:
        - shadow        # Often too noisy in production code

    gocritic:
      enabled-tags:
        - diagnostic    # Detect potential bugs
        - style         # Code style issues
        - performance   # Performance issues
      disabled-checks:
        - paramTypeCombine  # Often too pedantic
        - typeDefFirst      # Not always desirable

    gosec:
      excludes:
        - G104          # Unhandled errors (covered by errcheck)
        - G115          # Integer overflow conversion (all int→intN casts in this codebase are intentional and bounded)
        - G117          # Exported struct fields matching secret pattern (false positive for config types)
        - G703          # Path traversal via taint analysis (paths are internally derived)
        - G704          # SSRF via taint analysis (URLs are validated or user-configured)
        - G705          # XSS via taint analysis (stderr output is safe)

    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: unexported-return
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming

    # Complexity thresholds
    funlen:
      lines: 100         # Maximum function length in lines
      statements: 50      # Maximum number of statements

    gocognit:
      min-complexity: 15  # Cognitive complexity threshold

    gocyclo:
      min-complexity: 15  # Cyclomatic complexity threshold

    nestif:
      min-complexity: 4   # Nesting depth threshold

    dupl:
      threshold: 100      # Duplicate code threshold (tokens)

    unparam:
      check-exported: false  # Don't check exported functions

    maintidx:
      under: 20          # Maintainability index threshold

  exclusions:
    rules:
      # Relax linting for test files
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - funlen
          - gocognit
          - unparam
          - revive
          - wrapcheck
          - thelper
          - maintidx

      # Relax linting for generated code
      - path: "zz_generated.*\\.go"
        linters:
          - dupl
          - gocyclo
          - maintidx

      # Relax linting for main.go files
      - path: "cmd/.*/main\\.go"
        linters:
          - gocyclo
          - funlen

      # Package named "version" intentionally shadows stdlib for build metadata
      - path: "internal/version/version\\.go"
        linters:
          - revive

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/retran/meowg1k

issues:
  max-issues-per-linter: 0
  max-same-issues: 5

output:
  show-stats: true
