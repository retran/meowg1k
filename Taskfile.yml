version: '3'

vars:
  PROJECT_NAME: meowg1k
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "v0.1.0"
  LDFLAGS: >
    -s -w
    -X github.com/retran/meowg1k/internal/version.Version={{.VERSION}}
    -X github.com/retran/meowg1k/internal/version.BuildDate=$(date -u '+%Y-%m-%d_%H:%M:%S')
    -X github.com/retran/meowg1k/internal/version.GitCommit=$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')
  GOFLAGS: -trimpath -buildvcs=false
  COVERAGE_THRESHOLD: 75.0

tasks:
  default:
    cmds:
      - task: --list

  setup:
    desc: Setup development environment by downloading Go modules
    cmds:
      - echo "[INFO] Downloading and tidying Go modules..."
      - go mod download
      - go mod tidy
      - echo "[DONE] Setup complete."

  build:
    desc: Build the binary for the host OS/Arch
    deps: [clean]
    cmds:
      - echo "[INFO] Building {{.PROJECT_NAME}} v{{.VERSION}}..."
      - mkdir -p bin
      - CGO_ENABLED=0 GOFLAGS="{{.GOFLAGS}}" go build -ldflags "{{.LDFLAGS}}" -o "bin/meow" ./cmd/meow
      - echo "[DONE] Binary available at bin/meow"

  install:
    desc: Build and install the binary to GOBIN or GOPATH/bin
    deps: [setup]
    cmds:
      - echo "[INFO] Installing meow binary..."
      - |
        BIN_DIR="$(go env GOBIN)"; [ -z "$BIN_DIR" ] && BIN_DIR="$(go env GOPATH)/bin"
        CGO_ENABLED=0 GOFLAGS="{{.GOFLAGS}}" go build -ldflags "{{.LDFLAGS}}" -o "$BIN_DIR/meow" ./cmd/meow
        echo "[DONE] 'meow' installed successfully to $BIN_DIR"

  check:
    desc: Run all static analysis checks (vet, lint, security)
    cmds:
      - task: vet
      - task: lint
      - task: security

  fmt:
    desc: Format Go code using golangci-lint
    cmds:
      - echo "[INFO] Formatting Go source files..."
      - golangci-lint run --fix
      - echo "[DONE] Code formatted."

  vet:
    desc: Run 'go vet' to find potential issues
    cmds:
      - echo "[INFO] Running go vet..."
      - go vet ./...

  test:
    desc: Run tests with coverage reporting (excludes testutil packages)
    cmds:
      - echo "[INFO] Running tests with coverage..."
      - |
        COVERPKGS=$(go list ./... | grep -v testutil | tr '\n' ',' | sed 's/,$//')
        go test -v -race -coverpkg="$COVERPKGS" -coverprofile=coverage.out -covermode=atomic ./...
      - go tool cover -html=coverage.out -o coverage.html
      - task: coverage-check

  test-short:
    desc: Run tests without coverage for a quick check
    cmds:
      - echo "[INFO] Running short tests..."
      - go test -v -race -short ./...

  coverage-check:
    desc: Check if test coverage meets the threshold (internal task)
    silent: true
    cmds:
      - |
        if [ ! -f coverage.out ]; then
          echo "[FAIL] Coverage file not found. Run 'task test' first."
          exit 1
        fi
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "[INFO] Current test coverage: ${COVERAGE}% (threshold: {{.COVERAGE_THRESHOLD}}%)"
        if (( $(echo "$COVERAGE < {{.COVERAGE_THRESHOLD}}" | bc -l) )); then
          echo "[FAIL] Test coverage is below the {{.COVERAGE_THRESHOLD}}% threshold."
          exit 1
        else
          echo "[DONE] Test coverage meets the threshold."
        fi

  lint:
    desc: Run golangci-lint linter
    cmds:
      - echo "[INFO] Running linter..."
      - golangci-lint run --timeout=5m

  security:
    desc: Run security checks with gosec and govulncheck
    cmds:
      - echo "[INFO] Running gosec security scanner..."
      - go run github.com/securecodewarrior/gosec/v2/cmd/gosec@latest ./...
      - echo "[INFO] Running govulncheck for known vulnerabilities..."
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  clean:
    desc: Clean all build artifacts
    cmds:
      - echo "[INFO] Cleaning build artifacts..."
      - rm -rf bin coverage.out coverage.html dist

  info:
    desc: Show project and Go environment information
    cmds:
      - echo "Project: {{.PROJECT_NAME}}"
      - echo "Version: {{.VERSION}}"
      - go version

  # --- Git Hooks ---
  git:pre-commit:
    desc: Run pre-commit checks (vet, test, lint, man, completions)
    cmds:
      - echo "[INFO] Running pre-commit hook..."
      - task: vet
      - task: test
      - task: lint
      - task: man:check
      - task: completion:generate
      - echo "[DONE] Pre-commit checks passed."

  git:install-hook:
    desc: Install a git pre-commit hook to run 'task git:pre-commit'
    cmds:
      - echo "[INFO] Installing git pre-commit hook..."
      - mkdir -p .git/hooks
      - |
        cat > .git/hooks/pre-commit <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail
        if command -v task >/dev/null 2>&1; then
          echo "-> Running task git:pre-commit..."
          task git:pre-commit
        else
          echo "ERROR: 'task' command not found. Please install go-task: https://taskfile.dev"
          exit 1
        fi
        EOF
      - chmod +x .git/hooks/pre-commit
      - echo "[DONE] Git pre-commit hook installed successfully."

  # --- Artifacts ---
  completion:generate:
    desc: Generate shell completion scripts into dist/
    deps: [build]
    cmds:
      - echo "[INFO] Generating shell completions..."
      - mkdir -p dist/completions
      - ./bin/meow completion bash > dist/completions/bash.completion
      - ./bin/meow completion zsh > dist/completions/zsh.completion
      - ./bin/meow completion fish > dist/completions/fish.completion
      - ./bin/meow completion powershell > dist/completions/powershell.completion
      - echo "[DONE] Completions are in dist/completions/"

  man:check:
    desc: Validate man pages with mandoc
    cmds:
      - echo "[INFO] Validating man pages..."
      - for f in docs/man/*.?; do mandoc -Tlint "$f"; done
      - echo "[DONE] Man pages validation passed."

  man:preview:
    desc: Preview all man pages in the terminal
    cmds:
      - for f in docs/man/*.?; do echo "--- Previewing $f ---"; mandoc "$f" | col -bx; echo; done

  # --- Release ---
  release:
    desc: Create a new release using GoReleaser (requires GITHUB_TOKEN)
    deps: [completion:generate, man:check]
    cmds:
      - echo "[INFO] Starting GoReleaser..."
      - goreleaser release --clean
      - echo "[DONE] Release process finished."

  release:snapshot:
    desc: Build snapshot artifacts locally without publishing
    deps: [completion:generate, man:check]
    cmds:
      - echo "[INFO] Building release snapshot..."
      - goreleaser release --snapshot --clean
      - echo "[DONE] Snapshot artifacts are in ./dist"
