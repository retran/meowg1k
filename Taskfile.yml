version: '3'

vars:
  PROJECT_NAME: meowg1k
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "v0.1.0"
  LDFLAGS: >-
    -ldflags "-X github.com/retran/meowg1k/internal/version.Version={{.VERSION}}
    -X github.com/retran/meowg1k/internal/version.BuildDate=$(date -u '+%Y-%m-%d_%H:%M:%S')
    -X github.com/retran/meowg1k/internal/version.GitCommit=$(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')"

tasks:
  build:
    desc: Build all binaries
    aliases: [build]
    cmds:
      - mkdir -p bin
      - |
        echo "Building meowg1k..."
        go build {{.LDFLAGS}} -o "bin/meow" "./main.go"

  install:
    desc: Build and install the binary to $GOPATH/bin
    deps: [build]
    cmds:
      - |
        echo "Installing meow..."
        go install {{.LDFLAGS}} ./main.go
        echo "✅ meow installed to $(go env GOPATH)/bin!"

  check:
    desc: Run all checks
    cmds:
      - go fmt ./...
      - go vet ./...
      - go test ./...


  test:
    desc: Run tests with coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin coverage.out coverage.html

  setup:
    desc: Setup development environment
    cmds:
      - go mod download && go mod tidy
      - echo "🐱 Setup complete!"

  info:
    desc: Show build information
    cmds:
      - echo "Project{{":"}} {{.PROJECT_NAME}} v{{.VERSION}}"
      - go version
